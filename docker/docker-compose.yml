version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
#  Smart City Traffic Pipeline — Docker Compose
#  Services: Zookeeper · Kafka · Spark · PostgreSQL · Airflow
# ══════════════════════════════════════════════════════════════════════════════

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    PG_HOST: postgres
    PG_PORT: "5432"
    PG_DB: smartcity
    PG_USER: admin
    PG_PASS: admin123
    REPORT_DIR: /opt/airflow/reports
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./reports:/opt/airflow/reports
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - smartcity-net

services:

  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcity-net

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"   # external access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - smartcity-net

  # ── Kafka Topic Init ──────────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics …'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic traffic-raw --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic critical-traffic --partitions 2 --replication-factor 1
      echo 'Topics created:'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    networks:
      - smartcity-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_MULTIPLE_DATABASES: smartcity,airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./docker/create_multiple_dbs.sh:/docker-entrypoint-initdb.d/00_create_dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smartcity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcity-net

  # ── Spark Master ──────────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.4.2
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "8080:8080"    # Spark Web UI
      - "7077:7077"    # Spark master port
    networks:
      - smartcity-net

  # ── Spark Worker ──────────────────────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:3.4.2
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    networks:
      - smartcity-net

  # ── Spark Streaming Job ───────────────────────────────────────────────────────
  spark-stream:
    image: bitnami/spark:3.4.2
    container_name: spark-stream
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_IN: traffic-raw
      TOPIC_CRITICAL: critical-traffic
      CHECKPOINT_DIR: /tmp/spark_checkpoints
      PG_URL: "jdbc:postgresql://postgres:5432/smartcity"
      PG_USER: admin
      PG_PASS: admin123
    volumes:
      - ./spark_processing:/opt/spark_app
      - spark-checkpoints:/tmp/spark_checkpoints
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      pip install kafka-python --quiet
      spark-submit \
        --master spark://spark-master:7077 \
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.2,org.postgresql:postgresql:42.6.0 \
        --conf spark.sql.streaming.checkpointLocation=/tmp/spark_checkpoints \
        /opt/spark_app/spark_stream.py
      "
    networks:
      - smartcity-net

  # ── Traffic Producer ──────────────────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: traffic-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
    networks:
      - smartcity-net
    restart: on-failure

  # ── Airflow Init ──────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      pip install psycopg2-binary pandas --quiet
      airflow db migrate
      airflow users create \
        --username admin --password admin123 \
        --firstname Admin --lastname User \
        --role Admin --email admin@smartcity.lk
      echo 'Airflow initialised.'
      "

  # ── Airflow Scheduler ─────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: on-failure

  # ── Airflow Webserver ─────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"    # Airflow UI → http://localhost:8081
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  postgres-data:
  airflow-logs:
  spark-checkpoints:

networks:
  smartcity-net:
    driver: bridge